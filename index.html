        const audioPlayer = document.getElementById('audioPlayer');

        function createLyricsHTML() {
            let html = '<span class="section-title">Verse 1</span><br>';
            let verseCount = 1;
            
            lyrics.forEach((word, index) => {
                html += `<span class="word" data-index="${index}">${word.text}</span> `;
                
                if (word.text.endsWith('.') || word.text.endsWith('—')) {
                    html += '<br>';
                }
                
                if (index === 39) html += '<span class="section-title">Pre-Chorus</span><br>';
                if (index === 47) html += '<span class="section-title">Chorus 1</span><br>';
                if (index === 75) html += '<span class="section-title">Verse 2</span><br>';
                if (index === 91) html += '<span class="section-title">Pre-Chorus 2</span><br>';
                if (index === 99) html += '<span class="section-title">Chorus 2</span><br>';
                if (index === 127) html += '<span class="section-title">Bridge</span><br>';
                if (index === 143) html += '<span class="section-title">Final Chorus</span><br>';
            });
            
            lyricsDiv.innerHTML = html;
        }

        function updateLyrics() {
            const currentTime = audioPlayer.currentTime;
            
            lyrics.forEach((word, index) => {
                const wordElement = document.querySelector(`[data-index="${index}"]`);
                if (!wordElement) return;
                
                const nextWord = lyrics[index + 1];
                const nextTime = nextWord ? nextWord.time : 270;
                
                if (currentTime >= word.time && currentTime < nextTime) {
                    wordElement.classList.add('active');
                } else {
                    wordElement.classList.remove('active');
                }
            });
        }

        audioPlayer.addEventListener('timeupdate', updateLyrics);
        createLyricsHTML();
